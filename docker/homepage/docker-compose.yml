services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped

    ports:
      - "3001:3000"

    environment:
      HOMEPAGE_ALLOWED_HOSTS: 192.168.0.201:3001

    volumes:
      - /home/justin/docker-data/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - proxy

networks:
  proxy:
    external: true
