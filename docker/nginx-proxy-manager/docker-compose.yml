services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped

    ports:
      - "80:80"
      - "81:81"
      - "443:443"

    volumes:
      - /home/justin/docker-data/nginx-proxy-manager/data:/data
      - /home/justin/docker-data/nginx-proxy-manager/letsencrypt:/etc/letsencrypt

    networks:
      - proxy

networks:
  proxy:
    external: true
